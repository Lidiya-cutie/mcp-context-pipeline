name: unified_eval

on:
  workflow_dispatch:
  push:
    paths:
      - "src/external_knowledge/**"
      - "src/rest_api_metrics.py"
      - "src/rest_api_metrics_formulas.py"
      - "src/rest_api_evaluator.py"
      - "src/unified_evaluator.py"
      - "run_external_knowledge_eval.py"
      - "run_rest_api_eval.py"
      - "run_unified_eval.py"
      - "eval_queries_v*.jsonl"
      - "data/rest_api_eval_*.jsonl"
      - "tests/test_external_knowledge_*.py"
      - "tests/test_rest_api_*.py"
      - ".github/workflows/unified_eval.yml"
  pull_request:
    paths:
      - "src/external_knowledge/**"
      - "src/rest_api_metrics.py"
      - "src/rest_api_metrics_formulas.py"
      - "src/rest_api_evaluator.py"
      - "src/unified_evaluator.py"
      - "run_external_knowledge_eval.py"
      - "run_rest_api_eval.py"
      - "run_unified_eval.py"
      - "eval_queries_v*.jsonl"
      - "data/rest_api_eval_*.jsonl"
      - "tests/test_external_knowledge_*.py"
      - "tests/test_rest_api_*.py"
      - ".github/workflows/unified_eval.yml"

jobs:
  unified_eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unified eval
        env:
          EXTERNAL_KNOWLEDGE_USE_REDIS: "false"
          EXTERNAL_MASK_PII_QUERIES: "true"
          EVAL_DATASET_PATH: "eval_queries_v3.jsonl"
          EVAL_RECORD_LIMIT: "300"
          EVAL_TOP_K: "5"
          EVAL_CACHE_WARM_REPEAT: "1"
          EVAL_MIN_RECALL_AT_K: "0.60"
          EVAL_MIN_MRR: "0.45"
          EVAL_MIN_SOURCE_COVERAGE: "0.95"
          EVAL_MIN_PROVENANCE_COVERAGE: "0.95"
          EVAL_MAX_NOT_FOUND_RATE: "0.20"
          EVAL_MAX_P95_MS: "8000"
          EVAL_MIN_CACHE_HIT_RATE: "0.20"
          EVAL_MIN_FALLBACK_SUCCESS_RATE: "0.95"
          REST_API_EVAL_DATASET: "data/rest_api_eval_good.jsonl"
          REST_API_EVAL_OUTPUT: "artifacts/rest_api_eval"
          REST_API_MIN_RESOURCE_ORIENTATION: "0.8"
          REST_API_MIN_PAGINATION: "0.7"
          REST_API_MIN_VERSIONING: "0.6"
          REST_API_MIN_ERROR_CODES: "0.7"
          REST_API_MIN_STRUCTURAL_REDUNDANCY: "0.6"
          REST_API_MIN_OVERALL_SCORE: "0.7"
        run: python run_unified_eval.py

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-eval-artifacts
          path: artifacts/unified_eval/

      - name: Check gate status
        run: |
          if [ -f "artifacts/unified_eval/unified_eval_report.json" ]; then
            status=$(python -c "import json; print(json.load(open('artifacts/unified_eval/unified_eval_report.json'))['overall_status'])")
            if [ "$status" != "pass" ]; then
              echo "Unified eval failed"
              exit 1
            fi
          fi

      - name: Create PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('artifacts/unified_eval/unified_eval_report.json', 'utf8'));

            let comment = '## Unified Evaluation Results\n\n';
            comment += `Overall Status: ${report.overall_status === 'pass' ? 'PASS' : 'FAIL'}\n\n`;

            if (report.external_knowledge) {
              const ek = report.external_knowledge;
              comment += '### External Knowledge\n';
              comment += `- Status: ${ek.status}\n`;
              comment += `- Recall@K: ${ek.quality.recall_at_k.toFixed(4)}\n`;
              comment += `- MRR: ${ek.quality.mrr.toFixed(4)}\n`;
              comment += `- Latency P95: ${ek.quality.latency_ms_p95.toFixed(2)}ms\n`;
              comment += `- Cache Hit Rate: ${ek.quality.cache_hit_rate.toFixed(4)}\n\n`;
            }

            if (report.rest_api) {
              const ra = report.rest_api;
              comment += '### REST API\n';
              comment += `- Status: ${ra.status}\n`;
              comment += `- Overall Score: ${ra.quality.overall_score.toFixed(4)}\n`;
              comment += `- Resource Orientation: ${ra.quality.resource_orientation.score.toFixed(4)}\n`;
              comment += `- Pagination: ${ra.quality.pagination.score.toFixed(4)}\n`;
              comment += `- Versioning: ${ra.quality.versioning.score.toFixed(4)}\n`;
              comment += `- Error Codes: ${ra.quality.error_codes.score.toFixed(4)}\n`;
              comment += `- Structural Redundancy: ${ra.quality.structural_redundancy.score.toFixed(4)}\n\n`;
            }

            comment += '---\n';
            comment += `Generated at: ${report.timestamp}\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
